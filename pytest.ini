[pytest]
# 測試檔案搜尋路徑
testpaths = test

# 測試檔案命名模式
python_files = test_*.py

# 測試類別命名模式
python_classes = Test*

# 測試函數命名模式
python_functions = test_*

# 顯示測試摘要資訊
addopts = 
    -ra
    --strict-markers
    --tb=short

# 標記定義
markers =
    slow: 標記執行較慢的測試
    integration: 標記整合測試
    unit: 標記單元測試

# 忽略警告
filterwarnings =
    ignore::FutureWarning
    ignore::DeprecationWarning
